<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkCheck</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="title">LinkCheck</span>
      </div>
      <div class="header-right">
        <span id="page-host" class="page-host" title=""></span>
        <button id="btn-theme" class="btn-theme" title="Toggle light/dark theme">
          <svg id="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg id="icon-sun" class="hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Options row -->
    <div class="options-row">
      <label class="chip" title="Skip checking image file links">
        <input type="checkbox" id="opt-skip-images">
        <span class="chip-dot"></span>
        skip images
      </label>
      <label class="chip" title="Don't flag 403 Forbidden as broken">
        <input type="checkbox" id="opt-skip-403">
        <span class="chip-dot"></span>
        skip 403
      </label>
      <label class="chip" title="Show redirected links in results">
        <input type="checkbox" id="opt-show-redirects" checked>
        <span class="chip-dot"></span>
        redirects
      </label>
      <label class="chip" title="Highlight broken links on the page">
        <input type="checkbox" id="opt-highlight" checked>
        <span class="chip-dot"></span>
        highlight
      </label>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <button id="btn-start" class="btn-start">
        <svg class="btn-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span id="btn-start-label">Check Links</span>
      </button>
      <button id="btn-stop" class="btn-stop hidden">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="1"/>
        </svg>
        Stop
      </button>
      <button id="btn-copy-broken" class="btn-copy-broken hidden" title="Copy all broken URLs to clipboard">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span class="btn-copy-label">Copy Broken</span>
      </button>
      <button id="btn-export" class="btn-export" disabled title="Export results as Markdown">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7,10 12,15 17,10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
    </div>

    <!-- Progress -->
    <div id="section-progress" class="section-progress hidden">
      <div class="progress-meta">
        <span id="progress-label" class="progress-label">Scanning…</span>
        <span id="progress-count" class="progress-count"></span>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Stats strip -->
    <div id="section-stats" class="stats-strip hidden">
      <div class="stat-cell">
        <span id="stat-total" class="stat-num">0</span>
        <span class="stat-lbl">total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-cell accent-broken">
        <span id="stat-broken" class="stat-num">0</span>
        <span class="stat-lbl">broken</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-cell accent-redirect">
        <span id="stat-redirects" class="stat-num">0</span>
        <span class="stat-lbl">redirects</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-cell accent-ok">
        <span id="stat-ok" class="stat-num">0</span>
        <span class="stat-lbl">ok</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div id="section-tabs" class="tab-bar hidden">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="broken">Broken</button>
      <button class="tab" data-tab="redirects">Redirects</button>
      <button class="tab" data-tab="ok">OK</button>
    </div>

    <!-- Search / sort bar -->
    <div id="section-search" class="search-bar hidden">
      <input type="text" id="search-input" class="search-input" placeholder="Filter by URL or text…">
      <button id="btn-sort" class="btn-sort" title="Sort results">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M3 12h12M3 18h6"/>
        </svg>
        <span id="sort-label">Default</span>
      </button>
    </div>

    <!-- Results list -->
    <div id="results" class="results-list">
      <div class="empty-state" id="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <p>Press <strong>Check Links</strong> to scan this page</p>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
