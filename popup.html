<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkCheck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="title">LinkCheck</span>
      </div>
      <span id="page-host" class="page-host" title=""></span>
    </header>

    <!-- Options row -->
    <div class="options-row">
      <label class="chip" title="Skip checking image file links">
        <input type="checkbox" id="opt-skip-images">
        <span class="chip-dot"></span>
        skip images
      </label>
      <label class="chip" title="Don't flag 403 Forbidden as broken">
        <input type="checkbox" id="opt-skip-403">
        <span class="chip-dot"></span>
        skip 403
      </label>
      <label class="chip" title="Show redirected links in results">
        <input type="checkbox" id="opt-show-redirects" checked>
        <span class="chip-dot"></span>
        redirects
      </label>
      <label class="chip" title="Highlight broken links on the page">
        <input type="checkbox" id="opt-highlight" checked>
        <span class="chip-dot"></span>
        highlight
      </label>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <button id="btn-start" class="btn-start">
        <svg class="btn-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <span id="btn-start-label">Check Links</span>
      </button>
      <button id="btn-stop" class="btn-stop hidden">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="1"/>
        </svg>
        Stop
      </button>
      <button id="btn-export" class="btn-export" disabled title="Export results as Markdown">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7,10 12,15 17,10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
    </div>

    <!-- Progress -->
    <div id="section-progress" class="section-progress hidden">
      <div class="progress-meta">
        <span id="progress-label" class="progress-label">Scanning…</span>
        <span id="progress-count" class="progress-count"></span>
      </div>
      <div class="progress-track">
        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
      </div>
    </div>

    <!-- Stats strip -->
    <div id="section-stats" class="stats-strip hidden">
      <div class="stat-cell">
        <span id="stat-total" class="stat-num">0</span>
        <span class="stat-lbl">total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-cell accent-broken">
        <span id="stat-broken" class="stat-num">0</span>
        <span class="stat-lbl">broken</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-cell accent-redirect">
        <span id="stat-redirects" class="stat-num">0</span>
        <span class="stat-lbl">redirects</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-cell accent-ok">
        <span id="stat-ok" class="stat-num">0</span>
        <span class="stat-lbl">ok</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div id="section-tabs" class="tab-bar hidden">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="broken">Broken</button>
      <button class="tab" data-tab="redirects">Redirects</button>
      <button class="tab" data-tab="ok">OK</button>
    </div>

    <!-- Results list -->
    <div id="results" class="results-list">
      <div class="empty-state" id="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <p>Press <strong>Check Links</strong> to scan this page</p>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
